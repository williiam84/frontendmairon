<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Painel Admin - Avaliações</title>

    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>
        body {
            font-family: Arial;
            background: #f8f9fa;
            padding: 20px;
        }

        h1 {
            text-align: center;
            color: #003366;
        }

        .container {
            max-width: 800px;
            margin: auto;
        }

        .avaliacao {
            background: #fff;
            padding: 15px;
            margin-bottom: 15px;
            border-radius: 10px;
            border-left: 5px solid #0056b3;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        .topo {
            display: flex;
            justify-content: space-between;
        }

        .nome {
            font-weight: bold;
            color: #003366;
        }

        .estrelas {
            color: #fca311;
        }

        .comentario {
            margin: 10px 0;
        }

        .data {
            font-size: 12px;
            color: #777;
        }

        .btn-excluir {
            margin-top: 10px;
            background: #e63946;
            color: white;
            border: none;
            padding: 8px 12px;
            border-radius: 6px;
            cursor: pointer;
        }

        .btn-excluir:hover {
            background: #c1121f;
        }
    </style>
</head>

<body>

    <h1>Painel de Avaliações</h1>

    <div class="container" id="listaAdmin"></div>

<script>
const listaAdmin = document.getElementById("listaAdmin");

// ⭐ estrelas
function gerarEstrelas(nota) {
    let estrelas = "";
    for (let i = 1; i <= 5; i++) {
        estrelas += i <= nota
            ? '<i class="fa-solid fa-star"></i>'
            : '<i class="fa-regular fa-star"></i>';
    }
    return estrelas;
}

// 📅 data
function formatarData(dataISO) {
    const data = new Date(dataISO);
    return data.toLocaleDateString("pt-BR");
}

// 📥 buscar avaliações
async function carregarAvaliacoes() {
    const res = await fetch("https://apisistemadeavaliacao.onrender.com/avaliacoes");
    const data = await res.json();

    listaAdmin.innerHTML = "";

    data.forEach(av => {
        const div = document.createElement("div");
        div.classList.add("avaliacao");

        div.innerHTML = `
            <div class="topo">
                <span class="nome">${av.nome}</span>
                <span class="estrelas">${gerarEstrelas(av.nota)}</span>
            </div>

            <div class="comentario">${av.comentario}</div>
            <div class="data">${formatarData(av.data)}</div>

            <button class="btn-excluir" onclick="excluir(${av.id})">
                <i class="fa fa-trash"></i> Excluir
            </button>
        `;

        listaAdmin.appendChild(div);
    });
}

// 🗑️ excluir avaliação
async function excluir(id) {
    if (!confirm("Tem certeza que deseja excluir?")) return;

    await fetch(`https://apisistemadeavaliacao.onrender.com/avaliacoes/${id}`, {
        method: "DELETE"
    });

    carregarAvaliacoes();
}

// iniciar
carregarAvaliacoes();
</script>

</body>
</html>
